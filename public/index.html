<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="global.css" />
    <title>GCC³</title>
    <script>
      function hideAllContents() {
        [...document.getElementsByClassName("content-view")].forEach((view) => {
          view.style.display = "none";
        });
      }

      function changeContentView(targetViewName) {
        var event = new CustomEvent("changeContentView", { detail: targetViewName });
        window.dispatchEvent(event);
      }

      function redirectToNotes() {
        hideAllContents();
        document.getElementById("main-view").style.display = "block";
        changeContentView("notes");
      }

      function redirectToMainView() {
        hideAllContents();
        document.getElementById("main-view").style.display = "block";
        changeContentView("projects");
      }

      function redirectToClipboardView() {
        hideAllContents();
        document.getElementById("clipboard-view").style.display = "block";
        const iframe = document.getElementById("iframe-clipboard");
        iframe.src = iframe.src; // refresh it.
      }

      function collapseIndexIn() {
        document.getElementById("btn-collapse-index-in").style.display = "none";
        document.getElementById("btn-collapse-index-out").style.display = "block";
        document.getElementById("btn-collapse-index-out").style.position = "fixed";
        document.getElementById("btn-collapse-index-out").style.bottom = "10px";
        document.querySelector(".index").style.display = "none";
        document.querySelector(".content").style.width = "100%";
        document.querySelector(".content").style.marginLeft = "0px";
      }

      function collapseIndexOut() {
        document.getElementById("btn-collapse-index-in").style.display = "block";
        document.getElementById("btn-collapse-index-out").style.display = "none";
        document.querySelector(".index").style.display = "inline-block";
        document.querySelector(".content").style.width = "calc(100% - 193px)";
        document.querySelector(".content").style.marginLeft = "193px";
      }
    </script>
  </head>

  <body>
    <div class="wrapper wrapper-inline-block">
      <div class="index">
        <div class="title">
          <a href="https://www.gcc3.com" style="text-decoration: none">
            <h1 style="display: inline">GCC</h1>
            <div style="display: inline; vertical-align: top">3</div>
            <div id="label-lab">lab</div>
          </a>
        </div>
        <div style="display: flex; justify-content: space-between; height: 38px">
          <h4>Projects</h4>
          <h5 id="btn-collapse-index-in" class="btn-collapse-index" onclick="collapseIndexIn()"><<</h5>
        </div>

        <p>
          <a class="subject" href="#simple-ai-chat" onclick="redirectToMainView()">simple ai chat</a>
        </p>
        <p>
          <a class="subject" href="#timeline" onclick="redirectToMainView()">timeline</a>
        </p>
        <div>
          <a class="subject" href="#plain-text-note" onclick="redirectToMainView()">plain text note</a>
          <div class="tab subject" onclick="redirectToNotes()">unix note</div>
        </div>

        <h4>Links</h4>
        <p>
          <a href="https://github.com/gcc3"> GitHub </a>
        </p>
        <a href="https://twitter.com/318yang">@318yang</a>
      </div>

      <div class="content">
        <div class="content-view" id="main-view">
          <div id="root"></div>
          <script src="./main.js"></script>
        </div>
        <div class="content-view" id="clipboard-view" style="display: none">
          <iframe id="iframe-clipboard" frameborder="0" width="100%" height="83%" src="https://clipboard.gcc3.com"> </iframe>
        </div>
        <div style="height: 40px"></div>
        <div
          id="btn-collapse-index-out"
          class="btn-collapse-index"
          style="display: none; font-size: 20px; text-align: center"
          onclick="collapseIndexOut()"
        >
          •
        </div>
      </div>
    </div>
  </body>
</html>
