<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="global.css">
  <title>GCC³ Home</title>
  <script>
    function hideContents() {
      [...document.getElementsByClassName("content-view")].forEach(view => {
        view.style.display = "none";
      });
    }

    function redirectToMainView() {
      hideContents();
      document.getElementById("main-view").style.display = "block";
    }

    function redirectToTimelineView() {
      hideContents();
      document.getElementById("timeline-view").style.display = "block";
      const iframe = document.getElementById("iframe-timeline");
      iframe.src = iframe.src;  // refresh it.
    }

    function redirectToSimpleAiChatView() {
      hideContents();
      document.getElementById("simple-ai-chat-view").style.display = "block";
      // const iframe = document.getElementById("iframe-simple-ai-chat");
      // iframe.src = iframe.src;  // refresh it.
    }
    
    function redirectToClipboardView() {
      hideContents();
      document.getElementById("clipboard-view").style.display = "block";
      const iframe = document.getElementById("iframe-clipboard");
      iframe.src = iframe.src;  // refresh it.
    }

    function collapseIndexIn() {
      document.getElementById("btn-collapse-index-in").style.display = "none";
      document.getElementById("btn-collapse-index-out").style.display = "block";
      document.getElementById("btn-collapse-index-out").style.position = "fixed";
      document.getElementById("btn-collapse-index-out").style.bottom = "10px";
      document.querySelector(".index").style.display = "none";
      document.querySelector(".content").style.width = "100%";
      document.querySelector(".content").style.marginLeft = "0px";
    }

    function collapseIndexOut() {
      document.getElementById("btn-collapse-index-in").style.display = "block";
      document.getElementById("btn-collapse-index-out").style.display = "none";
      document.querySelector(".index").style.display = "inline-block";
      document.querySelector(".content").style.width = "calc(100% - 190px)";
      document.querySelector(".content").style.marginLeft = "10px";
    }
  </script>
</head>

<body>
  <div>
    <a href="https://www.gcc3.com" style="text-decoration:none">
      <h1 style="display:inline">GCC</h1>
      <div style="display:inline;vertical-align:top;">3</div>
      <div id="label-lab">lab</div>
    </a>
  </div>
  <p>Coding a better world～☕</p>
  <hr>
  <div class="wrapper wrapper-inline-block">
    <div id="index" class="index">
      <div style="display:flex;justify-content:space-between;height:38px">
        <h4>Projects</h4>
        <h4 id="btn-collapse-index-in" class="btn-collapse-index" onclick="collapseIndexIn()"><<</h4>
      </div>
      <p>
        <div class="subject" onclick="redirectToMainView()">timeline</div>
        <div class="tab subject" onclick="redirectToTimelineView()">live demo</div>
      </p>
      <p>
        <div class="subject" onclick="redirectToSimpleAiChatView()">simple ai chat(gpt)</div>
      </p>
      <p>
        <div class="subject" onclick="redirectToMainView()">plain text note</div>
        <div class="tab subject" onclick="redirectToMainView()">note list</div>
      </p>
      <h4>Tools</h4>
      <div class="project">
        <div class="subject" onclick="redirectToClipboardView()">clipboard</div>
        <div class="tab subject"><a href="https://github.com/lhypds/clipboard">git repo</a></div>
      </div>
      <p><a href="https://github.com/lhypds/input-method-switcher">input method switcher</a></p>
      <p><a href="https://github.com/lhypds/quick-launcher-2">quick launcher 2</a></p>
      <p><a href="https://github.com/lhypds/tf-gui">tfs gui</a></p>
      <p><a href="https://github.com/lhypds/bluetooth-file-transfor">bluetooth file transfer</a></p>
      <h4>Contact</h4>
      <p>
        318yang <a href="mailto:lhypds.dev@gmail.com">✉</a>
      </p>
      <a href="https://github.com/lhypds"><img src="img/github.ico" width="16" height="16"></a>
    </div>
    <div class="content">
      <div class="content-view" id="main-view">
        <div id="root"></div>
        <script src="./main.js"></script>
      </div>
      <div class="content-view" id="timeline-view" style="display:none">
        <iframe id="iframe-timeline" frameBorder="0" scrolling="no"
          src="https://timeline.gcc3.com">
        </iframe>
      </div>
      <div class="content-view" id="simple-ai-chat-view" style="display:none">
        <iframe id="iframe-simple-ai-chat" frameBorder="0"
          src="https://simple-ai-chat.gcc3.com">
        </iframe>
      </div>
      <div class="content-view" id="clipboard-view" style="display:none">
        <iframe id="iframe-clipboard" frameBorder="0"
          src="https://clipboard.gcc3.com">
        </iframe>
      </div>
      <div style="height:40px"></div>
      <div id="btn-collapse-index-out" class="btn-collapse-index" 
        style="display:none;font-size:20px;text-align:center" 
        onclick="collapseIndexOut()">•</div>
    </div>
  </div>
</body>
</html>
